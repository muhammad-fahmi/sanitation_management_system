services:
  app:
    image: ${DOCKER_IMAGE:-1808561084/bionic-backend}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    environment:
      CI_ENVIRONMENT: ${CI_ENVIRONMENT:-production}
      APP_BASE_URL: ${APP_BASE_URL:-https://cleaning.example.com/}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-cleaning.example.com}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bionic_db}
      DB_USER: ${DB_USER:-bionic_user}
      DB_PASS: ${DB_PASS:-change_me_in_production}
      DB_DRIVER: Postgre
      CACHE_HANDLER: ${CACHE_HANDLER:-redis}
      CACHE_BACKUP_HANDLER: ${CACHE_BACKUP_HANDLER:-file}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      AUTO_SEED: ${AUTO_SEED:-true}
      SEED_FORCE: ${SEED_FORCE:-false}
      SEEDER_CLASS: ${SEEDER_CLASS:-MainSeeder}
    volumes:
      - app_writable:/var/www/html/writable
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}"
      - "traefik.http.routers.${TRAEFIK_NAME:-bionic-backend}.rule=Host(`${TRAEFIK_HOST:-cleaning.example.com}`)"
      - "traefik.http.routers.${TRAEFIK_NAME:-bionic-backend}.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.${TRAEFIK_NAME:-bionic-backend}.tls=${TRAEFIK_TLS:-true}"
      - "traefik.http.services.${TRAEFIK_NAME:-bionic-backend}.loadbalancer.server.port=80"
    networks:
      - bionic_internal
      - traefik_public

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bionic_db}
      POSTGRES_USER: ${DB_USER:-bionic_user}
      POSTGRES_PASSWORD: ${DB_PASS:-change_me_in_production}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-bionic_user} -d ${DB_NAME:-bionic_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bionic_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bionic_internal

volumes:
  db_data:
  app_writable:
  redis_data:

networks:
  bionic_internal:
    driver: bridge
  traefik_public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
