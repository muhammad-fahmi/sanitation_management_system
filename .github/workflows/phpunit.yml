name: PHP Unit Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2"]
    env:
      CI: true
      CI_ENVIRONMENT: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, pdo, pdo_sqlite, sodium
          coverage: none

      - name: Show PHP info
        run: |
          php -v
          php -m

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always --testdox --log-junit junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: junit.xml
