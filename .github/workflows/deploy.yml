name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: Publish the latest tag in addition to versioned tags
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve Docker image name
        id: image
        shell: bash
        run: |
          if [ -n "${{ vars.DOCKERHUB_IMAGE_NAME }}" ]; then
            echo "name=${{ vars.DOCKERHUB_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ format('{0}/bionic-backend', secrets.DOCKERHUB_USERNAME) }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.push_latest || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
